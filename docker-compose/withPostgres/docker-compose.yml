services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - n8n-internal

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    # Odoo on the Docker host: use host.docker.internal (see extra_hosts). Do not use localhost â€” inside this container that is not your host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_TELEMETRY_DISABLED=true
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_EMAIL_MODE=smtp
      - N8N_SMTP_HOST=${N8N_SMTP_HOST:?Set N8N_SMTP_HOST in your .env file}
      - N8N_SMTP_PORT=${N8N_SMTP_PORT:?Set N8N_SMTP_PORT in your .env file}
      - N8N_SMTP_SSL=${N8N_SMTP_SSL:?Set N8N_SMTP_SSL in your .env file}
      - N8N_SMTP_USER=${N8N_SMTP_USER:?Set N8N_SMTP_USER in your .env file}
      - N8N_SMTP_PASS=${N8N_SMTP_PASS:?Set N8N_SMTP_PASS in your .env file}
      - N8N_SMTP_SENDER=${N8N_SMTP_SENDER:?Set N8N_SMTP_SENDER in your .env file}
      # secures only access to webhooks
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:?Set N8N_USER in your .env file}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in your .env file}
      - N8N_USER_MANAGEMENT_MAIN_USER_EMAIL=${N8N_USER:?Set N8N_USER in your .env file}
      - N8N_USER_MANAGEMENT_MAIN_USER_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in your .env file}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in your .env file}
      # debug level
      - N8N_LOG_LEVEL=debug
      - N8N_RUNNERS_TASK_TIMEOUT=120
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - ODOO_PASSWORD=${ODOO_PASSWORD:?Set ODOO_PASSWORD in your .env file}
      # Odoo 19+ External JSON-2: set ODOO_RPC=json2 and use ODOO_API_KEY (Bearer). Default jsonrpc.
      - ODOO_RPC=${ODOO_RPC:-jsonrpc}
      # HTTP timeout (ms) for Odoo Dedupe Check / Odoo Create Move Code nodes (SaaS can exceed 30s).
      - ODOO_HTTP_TIMEOUT_MS=${ODOO_HTTP_TIMEOUT_MS:-90000}

      # helloCash Config
      - HELLOCASH_BASE_URL=${HELLOCASH_BASE_URL:-https://api.hellocash.business}
      - HELLOCASH_API_TOKEN=${HELLOCASH_API_TOKEN:?Set HELLOCASH_API_TOKEN in your .env file}
      - HELLOCASH_IGNORE_SYNC_HOUR=${HELLOCASH_IGNORE_SYNC_HOUR:-false}
      - HELLOCASH_LIST_PATH=${HELLOCASH_LIST_PATH:-/api/v1/cashBook}
      - HELLOCASH_INVOICES_PATH=${HELLOCASH_INVOICES_PATH:-/api/v1/invoices}

      # Odoo: origin only (no /jsonrpc) â€” workflow appends /jsonrpc. From container, reach host Odoo via host.docker.internal.
      - ODOO_BASE_URL=${ODOO_BASE_URL:?Set ODOO_BASE_URL in your .env file}
      - ODOO_DB=${ODOO_DB:?Set ODOO_DB in your .env file}
      - ODOO_UID=${ODOO_UID:?Set ODOO_UID in your .env file}
      - ODOO_API_KEY=${ODOO_API_KEY:?Set ODOO_API_KEY in your env. file}

      # Account IDs (from account_group)
      - ACCOUNT_KASSE=${ACCOUNT_KASSE:?Set ACCOUNT_KASSE in your .env file}
      - ACCOUNT_BANK=${ACCOUNT_BANK:?Set ACCOUNT_BANK in your .env file}
      - ACCOUNT_ERLOESE=${ACCOUNT_ERLOESE:?Set ACCOUNT_ERLOESE in your .env file}
      - ACCOUNT_GUTSCHEIN=${ACCOUNT_GUTSCHEIN:?Set ACCOUNT_GUTSCHEIN in your .env file}

      # Tax IDs (from account_tax)
      - TAX_ID_19=${TAX_ID_19:?Set TAX_ID_19 in your .env file}
      - TAX_ID_7=${TAX_ID_7:?Set TAX_ID_7 in your .env file}

      # Journal ID (from account_journal)
      - ODOO_JOURNAL_ID=${ODOO_JOURNAL_ID:?Set ODOO_JOURNAL_ID in your .env file}

      # Sync Settings
      - SYNC_HOUR=${SYNC_HOUR:-22}
      - ERROR_EMAIL=${ERROR_EMAIL:?Set ERROR_EMAIL in your .env file}
      - ERROR_EMAIL_FROM=${ERROR_EMAIL_FROM}

    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n-internal

volumes:
  n8n_data:
  postgres_data:

networks:
  n8n-internal:
