services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - n8n-internal

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_EMAIL_MODE=smtp
      - N8N_SMTP_HOST=${SMTP_HOST:-mail.gmx.com}
      - N8N_SMTP_PORT=587
      - N8N_SMTP_SSL=false
      - N8N_SMTP_USER=i${SMTP_USER:-yobantu@gmx.net}
      - N8N_SMTP_PASS=${SMTP_PASSWORD}    # ŌåÉ reads from .env
      - N8N_SMTP_SENDER=${SMTP_SENDER:-yobantu@gmx.net}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_ENCRYPTION_KEY=db063d86-7722-4ccc-bc89-4851035ba990
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - ODOO_PASSWORD=${ODOO_PASSWORD} 
      
      # helloCash Config
      - HELLOCASH_BASE_URL=${HELLOCASH_BASE_URL:-https://api.hellocash.business}
      - HELLOCASH_API_TOKEN=${HELLOCASH_API_TOKEN}
      - HELLOCASH_IGNORE_SYNC_HOUR=true
      - HELLOCASH_LIST_PATH=${HELLOCASH_LIST_PATH:-/api/v1/cashBook}
      - HELLOCASH_INVOICES_PATH=${HELLOCASH_INVOICES_PATH:-/api/v1/invoices}
      
      # Odoo Connection
      - ODOO_BASE_URL=${ODOO_BASE_URL:-http://localhost:8069}
      - ODOO_DB=${ODOO_DB:-blumenladen}
      - ODOO_UID=${ODOO_UID:-6}
      
      # Account IDs (from account_group)
      - ACCOUNT_KASSE=${ACCOUNT_KASSE:-15}
      - ACCOUNT_BANK=${ACCOUNT_BANK:-16}
      - ACCOUNT_ERLOESE=${ACCOUNT_ERLOESE:-22}
      - ACCOUNT_GUTSCHEIN=${ACCOUNT_GUTSCHEIN:-21}
      - ACCOUNT_UST_19=${ACCOUNT_UST_19:-19}
      - ACCOUNT_UST_7=${ACCOUNT_UST_7:-20}
      
      # Tax IDs (from account_tax)
      - TAX_ID_19=${TAX_ID_19:-54}
      - TAX_ID_7=${TAX_ID_7:-26}
      
      # Journal ID (from account_journal)
      - ODOO_JOURNAL_ID=${ODOO_JOURNAL_ID:-15}
      
      # Sync Settings
      - SYNC_HOUR=${SYNC_HOUR:-22}
      - ERROR_EMAIL=${ERROR_EMAIL:-ovd@maola.tech}
      
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n-internal

volumes:
  n8n_data:
  postgres_data:

networks:
  n8n-internal:
